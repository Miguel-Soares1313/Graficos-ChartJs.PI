<html lang="en">

<head>
    <style>
        body {
            text-align: center;
            background-color: white !important;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementando o ChartJs</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
    .titulo {
        text-align: center;
        margin-bottom: -100;
        font-size: 50px;
        font-family: "Comic Sans MS";
        background-color: grey;
        padding: 10px 20px;
        display: inline-block;
        
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;


        margin: 150;
    }

    canvas {
        background-color:  grey;
        padding: 10px 20px;
        display: inline-block;
        max-width: 500px;
        height: 300px;

    }
</style>

<body>
    <div class="titulo">
        <b>Gráficos com ChartJs:</b>
    </div>
    <div class="container">
        <canvas id="graficoBarra"></canvas>

        <canvas id="graficoLinha"></canvas>
    </div>
</body>

</html>
<script>
    const ctxbarra = document.getElementById('graficoBarra');
    const ctxlinha = document.getElementById('graficoLinha');


    new Chart(ctxbarra, {
        type: 'bar',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura Média',
                backgroundColor: 'rgb(255, 20, 147)',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1

            },
            {
                label: 'Umidade Média',
                backgroundColor: 'rgb(0, 255, 0)',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: 'black',
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                }
            },


            scales: {
                x: {
                    ticks: {
                        color: 'black', // cor
                        font: {
                            size: 12,
                            weight: 'bold' // negrito
                        }
                    }
                },
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    new Chart(ctxlinha, {
        type: 'line',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura Média',
                backgroundColor: 'rgb(255, 20, 147)',
                borderColor: 'rgb(255, 20, 147',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1

            },
            {
                label: 'Umidade Média',
                backgroundColor: 'rgb(0, 255, 0)',
                borderColor: 'rgb(0, 255, 0)',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: 'black',
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                }
            },

            scales: {
                x: {
                    ticks: {
                        color: 'black', // cor
                        font: {
                            size: 12,
                            weight: 'bold' // negrito
                        }
                    }
                },
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
